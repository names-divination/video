<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画シアター</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .video-container {
            width: 90%;
            max-width: 800px;
            background: #000000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .video-info {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        h1 {
            font-size: 1.4rem;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="video-container" id="player-box">
        <video src="movie.mp4" controls playsinline id="my-video"></video>
        
        <div class="video-info">
            <h1>✦ Special Movie Theater ✦</h1>
            <p>認証に成功しました。限定動画を再生します。</p>
        </div>
    </div>

    <script>
        // パソコンのブラウザ用に動画を自動準備
        const vid = document.getElementById("my-video");
        vid.load();
    </script>

</body>
</html>
